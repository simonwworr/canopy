version: '3.8'

services:
  # Main canopy node service
  canopy:
    build:
      context: .
      dockerfile: .docker/Dockerfile
    container_name: canopy-node
    restart: unless-stopped
    ports:
      - "${P2P_PORT:-9000}:9000"       # P2P networking port
      - "${RPC_PORT:-50832}:50832"     # RPC API port
      - "${ADMIN_PORT:-50833}:50833"   # Admin API port
    volumes:
      - canopy-data:/root/.canopy
      - ./config:/root/.canopy/config:ro
    environment:
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - NETWORK_ID=${NETWORK_ID:-1}
    networks:
      - canopy-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:50832/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s

  # Auto-update service (optional, enable by overriding the profile)
  auto-update:
    build:
      context: .docker/auto-update
      dockerfile: Dockerfile
    container_name: canopy-auto-update
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - canopy-data:/root/.canopy
    environment:
      - CHECK_INTERVAL=${UPDATE_CHECK_INTERVAL:-3600}
      - CANOPY_CONTAINER=canopy-node
    networks:
      - canopy-net
    depends_on:
      - canopy
    profiles:
      - auto-update

volumes:
  canopy-data:
    driver: local
    name: canopy-data

networks:
  canopy-net:
    driver: bridge
    name: canopy-net
